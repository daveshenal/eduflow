name: Deploy EduFlow

on:
  push:
    branches:
      - master
    paths-ignore:
      - "evaluator-service/**"
      - "tests/**"
      - "docs/**"
      - "**.md"
      - "docker-compose.yml"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Start deployment record
        uses: bobheadxi/deployments@v1
        id: deployment-backend
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: backend

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.EDUFLOWBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.EDUFLOWBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.EDUFLOWBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: eduflow001-fuc3dpevgpbvdtgp.azurecr.io
          registryUsername: ${{ secrets.EDUFLOWBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EDUFLOWBACKEND_REGISTRY_PASSWORD }}
          containerAppName: eduflow-backend
          resourceGroup: rg-eduflow-res-dev-001
          imageToBuild: eduflow001-fuc3dpevgpbvdtgp.azurecr.io/eduflow-backend:${{ github.sha }}

      - name: Finish deployment record
        uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          env: backend
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment-backend.outputs.deployment_id }}

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Start deployment record
        uses: bobheadxi/deployments@v1
        id: deployment-frontend
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: frontend

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.EDUFLOWFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.EDUFLOWFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.EDUFLOWFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/dummy-ui
          dockerfilePath: ./Dockerfile
          registryUrl: eduflow001-fuc3dpevgpbvdtgp.azurecr.io
          registryUsername: ${{ secrets.EDUFLOWFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EDUFLOWFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: eduflow-frontend
          resourceGroup: rg-eduflow-res-dev-001
          imageToBuild: eduflow001-fuc3dpevgpbvdtgp.azurecr.io/eduflow-frontend:${{ github.sha }}

      - name: Finish deployment record
        uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          env: frontend
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment-frontend.outputs.deployment_id }}